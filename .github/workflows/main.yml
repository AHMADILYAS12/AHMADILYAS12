name: Generate Datas

on:
  # Berjalan otomatis setiap 12 jam
  schedule:
    - cron: "0 */12 * * *" 
  
  # Memungkinkan kamu menjalankan workflow ini secara manual kapan saja
  workflow_dispatch:
  
  # Berjalan setiap kali kamu melakukan push ke branch main
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generates a game from a github user contributions graph, outputs a svg animation at <summary_out_path>
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: AHMADILYAS12
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Push content hasil generate ke branch output
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
